<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — NoteBox</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <span class="badge rounded-pill bg-primary fs-5 px-3 py-2">N</span>
              <h4 class="mt-3 mb-0" id="formTitle">Welcome back</h4>
              <p class="text-muted small">Sign in to NoteBox</p>
            </div>
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-control" required autofocus placeholder="you@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" required minlength="6" placeholder="At least 6 characters">
              </div>
              <div id="loginError" class="text-danger small mb-2 d-none"></div>
              <button type="submit" id="submitBtn" class="btn btn-primary w-100">Log in</button>
            </form>
            <p class="text-muted small text-center mt-3 mb-0">
              <a href="#" id="modeToggle">Don't have an account? Sign up</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
