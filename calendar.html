<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar — NoteBox</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  #calendarGrid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  #calendarGrid .day { aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    border-radius:8px; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  #calendarGrid .day.blank { background:transparent; box-shadow:none; }
  #calendarGrid .day.today { background:#0d6efd; color:#fff; font-weight:600; }
  #calendarGrid .dow { text-align:center; font-size:.8rem; color:#6c757d; font-weight:600; }
</style>
<script src="https://kit.fontawesome.com/a646d08f7d.js" crossorigin="anonymous"></script>
<link rel="icon" type="image/x-icon" href="favicon/favicon.ico">


</head>
<body class="bg-light">
  <nav class="navbar navbar-expand bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">NoteBox</a>
      <div class="ms-auto d-flex gap-2">
        <a href="home.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-house"></i></a>
        <a href="notes.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-book"></i>Notes</a>
        <a href="index.html" class="btn btn-sm btn-outline-primary">Habits</a>
        <a href="settings.html" class="btn btn-sm btn-outline-primary">Settings</a>
        <a href="task.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-list-check"></i>Task</a>

        <button id="logoutBtn" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log out</button>
      </div>
    </div>
  </nav>

  <main class="container my-4" style="max-width:600px">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <button id="prevMonth" class="btn btn-outline-secondary btn-sm">&larr;</button>
      <h5 id="monthLabel" class="mb-0"></h5>
      <button id="nextMonth" class="btn btn-outline-secondary btn-sm">&rarr;</button>
    </div>
    <div id="calendarGrid"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
