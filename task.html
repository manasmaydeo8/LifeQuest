<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tasks — NoteBox</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/css_styles.css">
<script src="https://kit.fontawesome.com/a646d08f7d.js" crossorigin="anonymous"></script>
<style>
  .task-item { transition: all 0.2s; }
  .task-item.completed { text-decoration: line-through; opacity: 0.7; }
  .pomodoro-timer {
    font-size: 3.5rem;
    font-weight: bold;
    font-family: monospace;
  }
</style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">NoteBox</a>
      <div class="ms-auto d-flex gap-2">
        <a href="home.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-house"></i></a>
        <a href="notes.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-book"></i>Notes</a>
        <a href="tasks.html" class="btn btn-sm btn-outline-primary active"><i class="fa-solid fa-list-check"></i>Tasks</a>
        <a href="calendar.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-calendar"></i>Calendar</a>
        <a href="index.html" class="btn btn-sm btn-outline-primary">Habits</a>
        <a href="settings.html" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-gears"></i></a>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log out</button>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div class="row g-4">
      <!-- Tasks Section -->
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Tasks</h5>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#taskModal">
              <i class="fa-solid fa-plus"></i> New Task
            </button>
          </div>
          <div class="card-body">
            <input type="text" id="taskSearch" class="form-control mb-3" placeholder="Search tasks...">
            <div id="tasksList" class="list-group"></div>
          </div>
        </div>
      </div>

      <!-- Pomodoro Timer -->
      <div class="col-lg-5">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center">
            <h5 class="mb-4">Pomodoro Timer</h5>
            <div id="timerDisplay" class="pomodoro-timer text-primary mb-4">25:00</div>
            
            <div class="btn-group mb-4" role="group">
              <button id="btn25" class="btn btn-outline-primary active">25 min</button>
              <button id="btn15" class="btn btn-outline-primary">15 min</button>
              <button id="btn5" class="btn btn-outline-primary">5 min</button>
            </div>

            <div>
              <button id="startBtn" class="btn btn-success btn-lg px-5 me-2">Start</button>
              <button id="pauseBtn" class="btn btn-warning btn-lg px-5 me-2 d-none">Pause</button>
              <button id="resetBtn" class="btn btn-secondary btn-lg px-5">Reset</button>
            </div>

            <div class="mt-4 small text-muted" id="sessionInfo">Focus Session • 1/4</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Task Modal -->
  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">New Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="text" id="taskTitle" class="form-control mb-3" placeholder="Task title" required>
          <input type="date" id="taskDueDate" class="form-control mb-3">
          <select id="taskPriority" class="form-select">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="saveTaskBtn" class="btn btn-primary">Save Task</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Todo List Logic
    let tasks = JSON.parse(localStorage.getItem('notebox-tasks') || '[]');

    function saveTasks() {
      localStorage.setItem('notebox-tasks', JSON.stringify(tasks));
      renderTasks();
    }

    function renderTasks(filter = '') {
      const container = document.getElementById('tasksList');
      const filtered = tasks.filter(t => t.title.toLowerCase().includes(filter.toLowerCase()));

      container.innerHTML = filtered.map((task, i) => `
        <div class="list-group-item task-item d-flex justify-content-between align-items-center ${task.completed ? 'completed' : ''}">
          <div class="d-flex align-items-center">
            <input type="checkbox" class="form-check-input me-3" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${i})">
            <div>
              <div>${task.title}</div>
              ${task.dueDate ? `<small class="text-muted">Due: ${task.dueDate}</small>` : ''}
            </div>
          </div>
          <div>
            <span class="badge bg-${task.priority === 'high' ? 'danger' : task.priority === 'medium' ? 'warning' : 'secondary'}">${task.priority}</span>
            <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteTask(${i})">✕</button>
          </div>
        </div>
      `).join('') || '<p class="text-muted text-center py-4">No tasks yet. Add one above!</p>';
    }

    function toggleComplete(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
    }

    function deleteTask(index) {
      if (confirm('Delete this task?')) {
        tasks.splice(index, 1);
        saveTasks();
      }
    }

    // Pomodoro Timer
    let timerInterval, timeLeft = 25 * 60, isRunning = false;

    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById('timerDisplay').textContent = 
        `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      document.getElementById('startBtn').classList.add('d-none');
      document.getElementById('pauseBtn').classList.remove('d-none');

      timerInterval = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("Time's up! Great work!");
          resetTimer();
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      document.getElementById('startBtn').classList.remove('d-none');
      document.getElementById('pauseBtn').classList.add('d-none');
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      timeLeft = 25 * 60;
      updateDisplay();
      document.getElementById('startBtn').classList.remove('d-none');
      document.getElementById('pauseBtn').classList.add('d-none');
    }

    // Event Listeners
    document.getElementById('saveTaskBtn').addEventListener('click', () => {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) return;
      
      tasks.push({
        title,
        dueDate: document.getElementById('taskDueDate').value,
        priority: document.getElementById('taskPriority').value,
        completed: false
      });
      saveTasks();
      bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
      document.getElementById('taskTitle').value = '';
    });

    document.getElementById('taskSearch').addEventListener('input', (e) => renderTasks(e.target.value));

    // Pomodoro buttons
    document.getElementById('startBtn').addEventListener('click', startTimer);
    document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
    document.getElementById('resetBtn').addEventListener('click', resetTimer);

    // Initialize
    renderTasks();
    updateDisplay();
  </script>
</body>
</html>
