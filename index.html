<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Habitly — Habit Tracker</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="https://kit.fontawesome.com/a646d08f7d.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/css_styles.css" />
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">

  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="home.html">
          <span class="badge rounded-pill bg-primary me-2">H</span>
          <span class="fw-bold">Habitly</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <div class="text-muted small">Good day — keep going!</div>
          <button
            id="addBtn"
            class="btn btn-primary btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#habitModal"
          >
            <i class="bi bi-plus-lg me-1"></i> Add Habit
          </button>
          <a href="calender.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-calendar"></i>Calender</a>
          <a href="home.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-house"></i></a>

        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="row g-4">
        <aside class="col-12 col-md-4">
          <div class="card shadow-sm sticky-top">
            <div class="card-body">
              <h5 class="card-title mb-1">Today</h5>
              <p class="text-muted small mb-3">Overview & quick actions</p>
              <div id="todayProgress" class="d-flex align-items-center gap-3">
                <!-- progress circle injected by JS -->
              </div>

              <div id="breakStreaksWrap" class="mt-2"></div>

              <hr />
              <div class="mb-2">
                <input
                  id="searchInput"
                  class="form-control form-control-sm"
                  placeholder="Search habits"
                />
              </div>
              <div class="d-flex gap-2 mb-3">
                <button
                  id="filterAll"
                  class="btn btn-outline-secondary btn-sm active"
                >
                  All
                </button>
                <button
                  id="filterActive"
                  class="btn btn-outline-secondary btn-sm"
                >
                  Not done
                </button>
                <button
                  id="filterDone"
                  class="btn btn-outline-secondary btn-sm"
                >
                  Done
                </button>
              </div>

              <hr />
              <h6 class="small-muted mb-2">Your data</h6>
              <div class="d-flex gap-2">
                <button
                  id="exportBtn"
                  class="btn btn-outline-secondary btn-sm flex-fill"
                >
                  <i class="bi bi-download me-1"></i>Export
                </button>
                <button
                  id="importBtn"
                  class="btn btn-outline-secondary btn-sm flex-fill"
                >
                  <i class="bi bi-upload me-1"></i>Import
                </button>
                <input
                  type="file"
                  id="importFile"
                  accept="application/json"
                  class="d-none"
                />
              </div>
              <div id="importStatus" class="small-muted mt-2"></div>
            </div>
          </div>
        </aside>

        <section class="col-12 col-md-8">
          <div id="habitsGrid" class="row g-3">
            <!-- habit cards injected by JS -->
          </div>
        </section>
      </div>
    </main>

    <!-- Add / Edit Modal -->
    <div class="modal fade" id="habitModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form id="habitForm" class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add Habit</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="habitId" />

            <div class="mb-3">
              <label for="habitType" class="form-label"
                >What do you want to do?</label
              >
              <select id="habitType" class="form-select">
                <option value="build">Build a habit (do something)</option>
                <option value="break">Break a habit (quit something)</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="title" class="form-label" id="titleLabel"
                >Habit</label
              >
              <input
                id="title"
                class="form-control"
                required
                maxlength="60"
                placeholder="e.g., Read 20 pages"
              />
            </div>

            <div class="mb-3">
              <label for="color" class="form-label">Accent color</label>
              <input
                id="color"
                type="color"
                class="form-control form-control-color"
                value="#0d6efd"
              />
            </div>

            <div class="mb-3" id="goalField">
              <label for="goal" class="form-label">Goal (per week)</label>
              <input
                id="goal"
                type="number"
                min="1"
                class="form-control"
                value="3"
              />
            </div>

            <div class="mb-3 d-none" id="startDateField">
              <label for="startDate" class="form-label"
                >Quit / start date</label
              >
              <input id="startDate" type="date" class="form-control" />
              <div class="form-text">
                The day you stopped (or plan to stop). Streak counts clean days
                since then.
              </div>
            </div>

            <div class="form-text" id="titleHint">
              Tip: Enter a clear, actionable habit (e.g., "Read 20 pages").
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Save Habit</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Heatmap Modal -->
    <div class="modal fade" id="heatmapModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="heatmapModalTitle">Year in pixels</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div
              id="heatmapLegendWrap"
              class="d-flex justify-content-between align-items-center mb-2 small-muted"
            >
              <span id="heatmapSubtitle"></span>
              <span id="heatmapLegend"></span>
            </div>
            <div id="heatmapContainer" class="heatmap-scroll"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/js_app.js"></script>
  </body>
</html>
