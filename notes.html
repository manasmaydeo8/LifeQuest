<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notes — NoteBox</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://kit.fontawesome.com/a646d08f7d.js" crossorigin="anonymous"></script>
<link rel="icon" type="image/x-icon" href="favicon/favicon.ico">

</head>
<body class="bg-light">
  <nav class="navbar navbar-expand bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">NoteBox</a>
      <div class="ms-auto d-flex gap-2">
        <a href="home.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-house"></i></a>
        <a href="task.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-list-check"></i>Task</a>

        <a href="calendar.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-calendar"></i>Calender</a>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Log out</button>
      </div>
    </div>
  </nav>

  <main class="container my-4" style="max-width:700px">
    <h3 class="mb-3">My Notes</h3>

    <form id="noteForm" class="d-flex gap-2 mb-4">
      <input type="text" id="noteInput" class="form-control" placeholder="Write a note..." required maxlength="300">
      <button type="submit" class="btn btn-primary">Add</button>
    </form>
    <div id="notesList" class="d-flex flex-column gap-2"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
