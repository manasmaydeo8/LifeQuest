<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Settings — NoteBox</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/css_styles.css">
<script src="https://kit.fontawesome.com/a646d08f7d.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">NoteBox</a>
      <div class="ms-auto d-flex gap-2">
        <a href="home.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-house"></i></a>
        <a href="notes.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-book"></i>Notes</a>
        <a href="calendar.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-calendar"></i>Calendar</a>
        <a href="index.html" class="btn btn-sm btn-outline-primary">Habits</a>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log out</button>
      </div>
    </div>
  </nav>
  <h1 style="text-align: center;">Comming Soon!!</h1>

  <main class="container my-5" style="max-width:700px">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-4">Settings</h3>
        
        <div class="mb-4">
          <h5 class="mb-3">Appearance</h5>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="darkModeToggle">
            <label class="form-check-label" for="darkModeToggle">
              Dark Mode
            </label>
          </div>
        </div>

        <hr>

        <div class="mb-4">
          <h5 class="mb-3 text-danger">Danger Zone</h5>
          <button id="clearAllData" class="btn btn-outline-danger">
            <i class="fa-solid fa-trash"></i> Clear All Data
          </button>
          <p class="small text-muted mt-2">This will delete all notes, habits, and settings. Cannot be undone.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    function initDarkMode() {
      const toggle = document.getElementById('darkModeToggle');
      const currentTheme = localStorage.getItem('theme') || 'light';
      
      if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.checked = true;
      }

      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        }
      });
    }

    document.getElementById('clearAllData').addEventListener('click', () => {
      if (confirm('⚠️ This will permanently delete ALL your notes and habits. Are you sure?')) {
        localStorage.clear();
        sessionStorage.clear();
        alert('All data has been cleared. You will be redirected to login.');
        window.location.href = 'login.html';
      }
    });

    window.addEventListener('load', initDarkMode);
  </script>
</body>
</html>
